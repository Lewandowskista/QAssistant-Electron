name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x64
            label: mac-x64
          - os: macos-latest
            arch: arm64
            label: mac-arm64
          - os: windows-latest
            arch: x64
            label: windows-x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            npm run build:win
          else
            npx electron-vite build && npx electron-builder --mac --${{ matrix.arch }} --publish never
          fi
        shell: bash

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.label }}
          path: build_log.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: QAssistant-${{ matrix.label }}
          path: |
            dist/*.dmg
            dist/**/*.dmg
            dist/*.zip
            dist/**/*.zip
            dist/*.exe
            dist/**/*.exe
            dist/*.blockmap
            dist/**/*.blockmap
