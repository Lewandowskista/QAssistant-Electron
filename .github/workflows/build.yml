name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install x64 native modules for cross-compile (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          npm pack @napi-rs/canvas-darwin-x64@0.1.80
          mkdir -p node_modules/@napi-rs/canvas-darwin-x64
          tar -xzf napi-rs-canvas-darwin-x64-0.1.80.tgz -C node_modules/@napi-rs/canvas-darwin-x64 --strip-components=1

      - name: Build and Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            npm run build:mac
          else
            npm run build:win
          fi
        shell: bash

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.os }}
          path: build_log.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: QAssistant-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/**/*.dmg
            dist/*.zip
            dist/**/*.zip
            dist/*.exe
            dist/**/*.exe
            dist/*.blockmap
            dist/**/*.blockmap
