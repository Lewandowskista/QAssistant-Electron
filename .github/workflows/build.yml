name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build and Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            npm run build:mac || {
              echo "================ FATAL ERROR ================"
              echo "Checking if electron-vite actually built the 'out' folder:"
              ls -laR out/ || echo "no out folder exists!"
              echo "Checking if app.asar exists and what is inside it:"
              npx asar list dist/mac-arm64/QAssistant.app/Contents/Resources/app.asar || true
              npx asar list dist/mac/QAssistant.app/Contents/Resources/app.asar || true
              exit 1
            }
          else
            npm run build:win
          fi
        shell: bash

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}
          path: build_log.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: QAssistant-${{ matrix.os }}
          path: dist/*.{dmg,zip,exe,msi,blockmap}
