name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install canvas-darwin-x64 for cross-compile
        run: |
          npm pack @napi-rs/canvas-darwin-x64@0.1.80
          mkdir -p node_modules/@napi-rs/canvas-darwin-x64
          tar -xzf napi-rs-canvas-darwin-x64-0.1.80.tgz -C node_modules/@napi-rs/canvas-darwin-x64 --strip-components=1

      - name: Build Mac (Intel x64)
        run: npx electron-vite build && npx electron-builder --mac --x64 --publish never

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QAssistant-mac-x64
          path: |
            dist/*.dmg
            dist/**/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Windows (x64)
        run: npm run build:win

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QAssistant-windows-x64
          path: |
            dist/*.exe
            dist/**/*.exe
