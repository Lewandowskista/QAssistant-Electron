appId: com.lewandowskista.qassistant
productName: QAssistant
copyright: Copyright © 2026 Lewandowskista

directories:
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.js,postcss.config.js,tailwind.config.js,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,components.json}'
  - '!{.env,.env.*,.npmrc,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.app.json}'

mac:
  target:
    - target: dmg
      arch:
        - x64
  category: public.app-category.developer-tools
  # icon: src/assets/tray-icon.png # Temporary: electron-builder will try to convert or user can provide better icon later
  darkModeSupport: true
  gatekeeperAssess: false
  hardenedRuntime: false
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: src/assets/tray-icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: Lewandowskista
  repo: QAssistant-Electron
